external_components:
  - source: github://andyboeh/esphome-elero

spi:
  clk_pin: GPIO18
  mosi_pin: GPIO23
  miso_pin: GPIO19

elero:
  cs_pin: GPIO5
  gdo0_pin: GPIO26
  freq0: 0xc0
  freq1: 0x71
  freq2: 0x21

cover:
  - platform: elero
    blind_address: 0xa831e5
    channel: 4
    remote_address: 0xf0d008
    name: Schlafzimmer
    command_check_len: 29
    command_control_len: 27
    control_payload_1: 0x00
    control_payload_2: 0x04
    control_pck_inf1: 0x45
    control_pck_inf2: 0x10
    control_down_pck_inf2: 0x11
    control_hop: 0x1a
    control_backward_address: 0xa831e5
    control_forward_address: 0xf0d008
    control_short_dst: 0x04
